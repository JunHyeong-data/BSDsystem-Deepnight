# ============================================================
# 카메라 캘리브레이션 파라미터 (MORAI Fisheye)
# ============================================================
# 카메라 모델 : Equidistant Fisheye (OpenCV cv2.fisheye 표준)
# 투영 수식   : r = f · θ  (θ = 광축과 광선 사이 각도)
#
# 출처
#  - MORAI 센서 JSON : principalPoint, cameraFOV, lensDistortion
#  - 캘리브레이션    : fx = (W/2) / (FOV_h/2 rad) ≈ 409.73
#                     (수평 FOV 179° + equidistant 가정, SolvePnP 검증)
#
# 좌표계 약속 (MORAI 차량 프레임)
#   X : 전방(+), 후방(-)
#   Y : 우측(+), 좌측(-)
#   Z : 상향(+), 하향(-)
#   Yaw: 위에서 봤을 때 시계방향 (0=전방, 90=우측, 270=좌측)
#
# 카메라 2대 구성 (수평 FOV 179°, fisheye)
#   Camera-1 : 우측 BSD 카메라 (yaw=90°,  우측 후방 사각지대)
#   Camera-2 : 좌측 BSD 카메라 (yaw=270°, 좌측 후방 사각지대)
# ============================================================

# ── 카메라 모델 선언 ────────────────────────────────────────
# OpenCV fisheye 표준. MORAI는 distortion 0의 이상적 equidistant.
# 핀홀 모델로 fallback 하면 안 됨 (FOV 179°에선 수학적으로 불가능).
projection_model: equidistant

# ── 공통 내부 파라미터 (Intrinsic) ──────────────────────────
# MORAI JSON 원시값 참고:
#   focalLengthpixel : 320.0       ← 핀홀 가정값, fisheye엔 부적합 (무시)
#   principalPoint   : (640, 360)  ← 그대로 사용
#   cameraFOV        : 179.0°      ← 수평 FOV (MORAI 표준)
#   lensDistortion   : [0, 0, 0]   ← 이상적 렌즈 → fisheye 4계수 모두 0
#
# Fisheye fx 산출 (equidistant + 수평 FOV 179°):
#   fx = (image_width / 2) / (FOV_h / 2 in rad)
#      = 640 / (179° / 2 → 1.5621 rad)
#      ≈ 409.73
intrinsic:
  fx: 409.73         # fisheye 초점거리 x (pixel)
  fy: 409.73         # fisheye 초점거리 y (pixel)
  cx: 640.0          # 주점 x = image_width / 2
  cy: 360.0          # 주점 y = image_height / 2
  image_width:  1280
  image_height:  720
  # OpenCV fisheye 왜곡 계수 [k1, k2, k3, k4]
  # MORAI는 distortion 0의 이상적 equidistant 모델 → 모두 0
  dist_coeffs_fisheye: [0.0, 0.0, 0.0, 0.0]

# ── Camera-1: 우측 BSD 카메라 ────────────────────────────────
# MORAI JSON: frameID="Camera-1"
#   pos: x=2.150m(전방), y=0.900m(우측), z=0.550m(상향)
#   rot: roll=0°, pitch=15°(앞쪽이 아래로), yaw=90°(우측 방향)
camera_right:
  # 장착 위치 (차량 좌표계 기준, 단위: m)
  mount_x:  2.150    # 전방 오프셋 (앞 범퍼 방향)
  mount_y:  0.900    # 우측 오프셋 (사이드 미러 부근)
  mount_z:  0.550    # 장착 높이

  # 장착 각도 (MORAI Euler 각도, 단위: 도)
  roll_deg:   0.0
  pitch_deg: 15.0    # 양수 = 앞쪽이 아래로 기울어짐 (지면 방향)
  yaw_deg:   90.0    # 우측 방향 (시계방향 기준)

  # 이 카메라가 보는 방향
  # 광축 in 차량 프레임 ≈ (0, +0.966, -0.259) → 우측+약간하향

# ── Camera-2: 좌측 BSD 카메라 ────────────────────────────────
# MORAI JSON: frameID="Camera-2"
#   pos: x=2.150m(전방), y=-0.900m(좌측), z=0.550m(상향)
#   rot: roll=0°, pitch=15°, yaw=270°(좌측 방향)
camera_left:
  # 장착 위치 (차량 좌표계 기준, 단위: m)
  mount_x:  2.150    # 전방 오프셋
  mount_y: -0.900    # 좌측 오프셋
  mount_z:  0.550    # 장착 높이

  # 장착 각도
  roll_deg:   0.0
  pitch_deg: 15.0    # 동일: 앞쪽이 아래로
  yaw_deg:  270.0    # 좌측 방향

  # 광축 in 차량 프레임 ≈ (0, -0.966, -0.259) → 좌측+약간하향

# ── BSD 사각지대 판단 기준 ───────────────────────────────────
# 차량 좌표계 기준 (단위: m)
bsd_zone:
  lateral_min:  0.5   # 측방 최소 거리 (차체로부터)
  lateral_max:  2.5   # 측방 최대 거리
  forward_max:  3.0   # 전방 한계 (B-필러 기준)
  rear_max:     6.0   # 후방 한계

# ── (하위 호환) 단일 camera 키 — calibration.py / coord_transform.py용 ──
# Fisheye 모델 기준 (intrinsic 섹션과 동일 값).
# 새 코드는 위쪽 intrinsic / projection_model 키를 사용할 것.
camera:
  fx: 409.73
  fy: 409.73
  cx: 640.0
  cy: 360.0
  image_width:  1280
  image_height:  720
  # OpenCV fisheye 4계수 [k1, k2, k3, k4] — MORAI는 이상적 모델 → 모두 0
  dist_coeffs_fisheye: [0.0, 0.0, 0.0, 0.0]
  # 우측 BSD 카메라 기준 mount (coord_transform 구버전 호환)
  mount_height: 0.550
  mount_x: 2.150
  mount_y: 0.900     # 우측 카메라 기본값 (좌측 사용 시 -0.900)
  pitch_deg: 15.0
  yaw_deg:   90.0
